  <style>
    :root{
      --ikb:#002fa7; --ivory:#f5edda; --ivory-soft:#d9d2c4; --coral:#f2a48c;
      --rule:rgba(245,237,218,.24);
    }
    *,*::before,*::after{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0; background:var(--ikb); color:var(--ivory);
      font-family:"Bricolage Grotesque",system-ui,sans-serif;
      -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
      display:flex; align-items:center; justify-content:center; padding:2.5rem 2rem;
    }
    main{
      width:100%; max-width:60rem; display:grid;
      grid-template-columns:auto auto; align-items:stretch; gap:clamp(2rem,5vw,4rem);
      justify-content:center;
    }
    .portrait{
      width:clamp(170px,30vw,290px); aspect-ratio:4/5; align-self:start;
      border-radius:9999px 9999px 0 0; overflow:hidden; flex-shrink:0;
      animation:rise .9s cubic-bezier(.16,1,.3,1) both;
    }
    .portrait img{width:100%;height:100%;object-fit:cover;display:block;}
    .content{
      display:flex; flex-direction:column; min-height:clamp(212px,37.5vw,362px);
      animation:rise .9s cubic-bezier(.16,1,.3,1) .08s both;
    }
    .name{
      font-family:"Bricolage Grotesque",sans-serif; text-transform:uppercase; font-weight:800;
      font-size:clamp(2.7rem,8.5vw,5.4rem); line-height:.9; letter-spacing:-0.01em;
      margin:0; color:var(--ivory);
    }
    .tag{
      font-family:"Fraunces",Georgia,serif; font-style:italic; font-weight:400;
      font-size:clamp(1.2rem,2.6vw,1.6rem); line-height:1.3; color:var(--ivory-soft);
      margin:1.3rem 0 0; max-width:26rem;
    }
    .links{ margin-top:auto; padding-top:1.3rem; border-top:1px solid var(--rule); max-width:26rem; }
    a.link{
      display:inline-flex; align-items:center; gap:.45rem; color:var(--coral);
      text-decoration:none; font-size:1rem; font-weight:500; letter-spacing:.015em; position:relative;
    }
    a.link::after{
      content:""; position:absolute; left:0; bottom:-3px; width:100%; height:1px;
      background:var(--coral); transform:scaleX(0); transform-origin:left;
      transition:transform .35s cubic-bezier(.16,1,.3,1);
    }
    a.link:hover::after,a.link:focus-visible::after{transform:scaleX(1);}
    a.link:focus-visible{outline:2px solid var(--coral); outline-offset:4px; border-radius:2px;}
    a.link svg{width:.85em;height:.85em;transition:transform .35s cubic-bezier(.16,1,.3,1);}
    a.link:hover svg,a.link:focus-visible svg{transform:translate(2px,-2px);}
    @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    @media (max-width:640px){
      main{grid-template-columns:1fr;justify-items:center;text-align:center;gap:2rem;align-items:center;}
      .content{align-items:center;min-height:auto;}
      .links{margin-top:1.9rem;}
      .tag,.links{max-width:30rem;}
    }
    @media (prefers-reduced-motion:reduce){
      .portrait,.content{animation:none;}
      a.link::after,a.link svg{transition:none;}
    }
  </style>
</head>
